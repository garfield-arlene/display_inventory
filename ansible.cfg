# ansible.cfg
# Place this file in the root of your project (next to your playbooks).

[defaults]
# Custom module stub (for ansible-doc and argument validation)
library            = ./library

# Controller-side action plugin — does all the real inventory work
action_plugins     = ./action_plugins

# Role path
roles_path         = ./roles

# Recommended output settings
stdout_callback    = yaml
bin_ansible_callbacks = True
